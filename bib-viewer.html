<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BibTeX entry viewer for Yue Zhao publications in LLM safety, robustness, agents, AI safety, and ML systems.">
  <meta name="keywords" content="Yue Zhao BibTeX, publications, LLM Safety, Robustness, Agents, AI Safety, ML Systems">
  <title>BibTeX Viewer | Yue Zhao Publications</title>
  <link rel="canonical" href="https://viterbi-web.usc.edu/~yzhao010/bib-viewer.html">
  <link rel="icon" type="image/x-icon" href="images/logo2.ico">
  <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css';">
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <main id="main-content" class="container content-spacing">
    <h1 style="color:#990000; font-size:1.75rem;">BibTeX Entry</h1>
    <p id="query-title" style="margin-bottom:12px;"></p>
    <div style="margin-bottom:12px;">
      <a href="publications.html">Back to Publications</a> |
      <a href="files/yue-zhao.bib">View Full BibTeX File</a>
    </div>
    <button id="copy-btn" class="btn btn-sm btn-outline-dark" style="margin-bottom:12px;" disabled>Copy BibTeX</button>
    <pre id="bib-content" style="background:#f8f8f8; border:1px solid #ddd; border-radius:8px; padding:14px; white-space:pre-wrap;"></pre>
  </main>

  <script>
    function getQueryParam(name) {
      var params = new URLSearchParams(window.location.search);
      return params.get(name) || '';
    }

    function normalizeTitle(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/&amp;/g, 'and')
        .replace(/[{}]/g, '')
        .replace(/[^a-z0-9]+/g, '');
    }

    function splitBibEntries(text) {
      var entries = [];
      var i = 0;
      while (i < text.length) {
        while (i < text.length && text[i] !== '@') i++;
        if (i >= text.length) break;

        var start = i;
        while (i < text.length && text[i] !== '{') i++;
        if (i >= text.length) break;

        var depth = 0;
        var inQuotes = false;
        for (; i < text.length; i++) {
          var ch = text[i];
          if (ch === '"' && text[i - 1] !== '\\') inQuotes = !inQuotes;
          if (!inQuotes) {
            if (ch === '{') depth++;
            if (ch === '}') {
              depth--;
              if (depth === 0) {
                i++;
                break;
              }
            }
          }
        }
        entries.push(text.slice(start, i).trim());
      }
      return entries;
    }

    function extractBibField(entry, fieldName) {
      var pattern = new RegExp('(?:^|,)\\s*' + fieldName + '\\s*=\\s*', 'i');
      var match = pattern.exec(entry);
      if (!match) return '';

      var i = match.index + match[0].length;
      while (i < entry.length && /\s/.test(entry[i])) i++;
      if (i >= entry.length) return '';

      if (entry[i] === '{') {
        i++;
        var start = i;
        var depth = 1;
        var inQuotes = false;
        for (; i < entry.length; i++) {
          var ch = entry[i];
          if (ch === '"' && entry[i - 1] !== '\\') inQuotes = !inQuotes;
          if (!inQuotes) {
            if (ch === '{') depth++;
            if (ch === '}') {
              depth--;
              if (depth === 0) return entry.slice(start, i).trim();
            }
          }
        }
        return entry.slice(start).trim();
      }

      if (entry[i] === '"') {
        i++;
        var qStart = i;
        for (; i < entry.length; i++) {
          if (entry[i] === '"' && entry[i - 1] !== '\\') {
            return entry.slice(qStart, i).trim();
          }
        }
        return entry.slice(qStart).trim();
      }

      var rawStart = i;
      while (i < entry.length && entry[i] !== ',' && entry[i] !== '\n') i++;
      return entry.slice(rawStart, i).trim();
    }

    function extractBibTitle(entry) {
      return extractBibField(entry, 'title');
    }

    function findBibEntryByTitle(entries, title) {
      var normalizedTitle = normalizeTitle(title);
      if (!normalizedTitle) return null;

      var titleCandidates = [normalizedTitle];
      if (title.indexOf(':') !== -1) {
        var tail = normalizeTitle(title.split(':').slice(1).join(':'));
        if (tail) titleCandidates.push(tail);
      }

      var exactMatch = null;
      var fuzzyMatch = null;

      entries.forEach(function(entry) {
        var bibTitle = extractBibTitle(entry);
        var normalizedBibTitle = normalizeTitle(bibTitle);

        titleCandidates.forEach(function(candidate) {
          if (!candidate) return;

          if (!exactMatch && normalizedBibTitle === candidate) {
            exactMatch = entry;
          } else if (
            !fuzzyMatch &&
            normalizedBibTitle.indexOf(candidate.slice(0, 24)) !== -1
          ) {
            fuzzyMatch = entry;
          }
        });

        if (!fuzzyMatch && !exactMatch) {
          var shortTarget = normalizedTitle.slice(0, 12);
          if (shortTarget && normalizedBibTitle.indexOf(shortTarget) !== -1) {
            fuzzyMatch = entry;
          }
        }
      });

      return exactMatch || fuzzyMatch;
    }

    document.addEventListener('DOMContentLoaded', function() {
      var id = getQueryParam('id');
      var fallbackTitle = getQueryParam('title');
      var queryTitleEl = document.getElementById('query-title');
      var bibContentEl = document.getElementById('bib-content');
      var copyBtn = document.getElementById('copy-btn');

      if (!id && !fallbackTitle) {
        queryTitleEl.textContent = 'No paper id provided.';
        bibContentEl.textContent = 'Please open this page from the Publications page.';
        return;
      }

      if (id) {
        queryTitleEl.textContent = 'Paper ID: ' + id;
      } else {
        queryTitleEl.textContent = 'Paper: ' + fallbackTitle;
      }

      var bibPromise = fetch('files/yue-zhao.bib').then(function(response) {
        if (!response.ok) throw new Error('Failed to load yue-zhao.bib');
        return response.text();
      });

      var publicationsPromise = id
        ? fetch('data/publications.json').then(function(response) {
            if (!response.ok) throw new Error('Failed to load publications data');
            return response.json();
          })
        : Promise.resolve([]);

      Promise.all([bibPromise, publicationsPromise])
        .then(function(results) {
          var allBib = results[0];
          var publications = Array.isArray(results[1]) ? results[1] : [];
          var entries = splitBibEntries(allBib);

          var resolvedTitle = fallbackTitle;
          if (id) {
            var matchedPublication = publications.find(function(item) {
              return item && item.id === id;
            });
            if (!matchedPublication) {
              bibContentEl.textContent = 'No publication found for id "' + id + '".';
              return;
            }
            resolvedTitle = matchedPublication.title || '';
            queryTitleEl.textContent = 'Paper: ' + resolvedTitle + ' (id: ' + id + ')';
          }

          var matched = findBibEntryByTitle(entries, resolvedTitle);
          if (matched) {
            bibContentEl.textContent = matched;
            copyBtn.disabled = false;
            copyBtn.addEventListener('click', function() {
              navigator.clipboard.writeText(matched).then(function() {
                copyBtn.textContent = 'Copied';
              });
            });
          } else {
            bibContentEl.textContent = 'No matching BibTeX entry found. Please use "View Full BibTeX File".';
          }
        })
        .catch(function(error) {
          console.error(error);
          bibContentEl.textContent = 'Failed to load required files.';
        });
    });
  </script>
</body>
</html>

name: Sync Bib and CV to USC Proposal Template Repo

on:
  push:
    branches:
      - main
    paths:
      - "files/yue-zhao.bib"
      - "files/ZHAO_YUE_CV.pdf"
  workflow_dispatch:

concurrency:
  group: sync-bib-cv-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-usc:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout USC target repo
        uses: actions/checkout@v4
        with:
          repository: yzhao062/USC-Proposal-Template-Yue
          token: ${{ secrets.TARGET_REPO_TOKEN }}
          path: usc-target-repo

      - name: Copy latest Bib and CV to USC repo
        run: |
          cp files/yue-zhao.bib usc-target-repo/yue-zhao.bib
          cp files/ZHAO_YUE_CV.pdf usc-target-repo/ZHAO_YUE_CV.pdf

      - name: Commit and push USC changes if changed
        working-directory: usc-target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add yue-zhao.bib ZHAO_YUE_CV.pdf

          if git diff --cached --quiet; then
            echo "No USC changes to sync."
            exit 0
          fi

          git commit -m "Sync Bib and CV from yzhao062.github.io (${GITHUB_SHA})"
          for i in 1 2 3; do
            git pull --rebase origin main
            git push && break
            if [ "$i" -eq 3 ]; then
              echo "USC push failed after 3 attempts."
              exit 1
            fi
            sleep 2
          done

  sync-nsf:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout NSF target repo
        uses: actions/checkout@v4
        with:
          repository: yzhao062/NSF-Proposal-Template-Yue
          token: ${{ secrets.NSF_REPO_TOKEN }}
          path: nsf-target-repo

      - name: Copy latest Bib to NSF repo
        run: |
          cp files/yue-zhao.bib nsf-target-repo/bibs/yue-zhao.bib

      - name: Commit and push NSF bib if changed
        working-directory: nsf-target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bibs/yue-zhao.bib

          if git diff --cached --quiet; then
            echo "No NSF bib changes to sync."
            exit 0
          fi

          git commit -m "Sync bib from yzhao062.github.io (${GITHUB_SHA})"
          for i in 1 2 3; do
            git pull --rebase origin main
            git push && break
            if [ "$i" -eq 3 ]; then
              echo "NSF push failed after 3 attempts."
              exit 1
            fi
            sleep 2
          done

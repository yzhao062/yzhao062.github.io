name: Site Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  site-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run static site checks
        env:
          CHECK_PUBLIC_URLS: "1"
          PUBLIC_URLS: "https://yzhao062.github.io/"
          PUBLIC_URLS_SOFT: "https://viterbi-web.usc.edu/~yzhao010/"
        run: python scripts/ci_check_site.py

      - name: Install post_to_x dependencies
        run: pip install -r scripts/requirements-post.txt

      - name: Run post_to_x contract checks
        run: python scripts/check_post_to_x_contract.py
